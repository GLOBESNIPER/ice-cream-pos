<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Maalem POS</title>
<meta name="theme-color" content="#6c3fc5">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple: #6c3fc5;
    --purple-light: #8b5cf6;
    --purple-dark: #4c1d95;
    --pink: #ec4899;
    --bg: #0f0a1e;
    --surface: #1a1030;
    --surface2: #251848;
    --card: #2d1f5e;
    --card-hover: #3a2778;
    --text: #f3e8ff;
    --text-muted: #a78bfa;
    --success: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --radius: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(135deg, var(--purple-dark), var(--purple));
    padding: 14px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 20px rgba(108,63,197,.4);
  }

  .header-title { display: flex; flex-direction: column; }
  .header-title .brand { font-size: 11px; opacity: .7; letter-spacing: .1em; text-transform: uppercase; }
  .header-title .page  { font-size: 18px; font-weight: 700; }

  .sync-chip {
    cursor: pointer;
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .04em;
    text-transform: uppercase;
    background: rgba(255,255,255,.18);
    border-radius: 50px;
    padding: 2px 8px;
    vertical-align: 2px;
    margin-left: 4px;
  }
  .sync-chip.online { background: var(--success); color: #06281c; }
  .sync-chip.pending { background: var(--warn); color: #2a1c02; }

  .header-actions { display: flex; gap: 8px; }

  .hdr-btn {
    position: relative;
    background: rgba(255,255,255,.15);
    border: none;
    border-radius: 50px;
    padding: 8px 14px;
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .hdr-btn:active { background: rgba(255,255,255,.25); }

  .cart-badge {
    position: absolute;
    top: -5px; right: -5px;
    background: var(--pink);
    color: white;
    border-radius: 50%;
    width: 20px; height: 20px;
    font-size: 11px;
    font-weight: 700;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .cart-badge.show { display: flex; }

  /* Search */
  .search-wrap { padding: 12px 16px 0; }
  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid rgba(167,139,250,.2);
    border-radius: 50px;
    padding: 10px 16px;
    color: var(--text);
    font-size: 15px;
    outline: none;
  }
  .search-input::placeholder { color: var(--text-muted); }

  /* Products */
  .products-section { padding: 12px 16px 180px; }

  .section-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .product-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: transform .1s, border-color .15s, background .15s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
    user-select: none;
  }
  .product-card:active {
    transform: scale(.96);
    background: var(--card-hover);
    border-color: var(--purple-light);
  }
  .product-card.in-cart { border-color: rgba(139,92,246,.5); }
  .product-card.out-of-stock { opacity: .45; }

  .product-avatar {
    width: 42px; height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    font-weight: 800;
    color: white;
    margin-bottom: 10px;
  }

  .product-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .product-price { font-size: 13px; color: var(--text-muted); font-weight: 500; }
  .product-price span { color: var(--purple-light); font-weight: 700; }

  .product-stock {
    font-size: 11px;
    margin-top: 6px;
    font-weight: 600;
    color: var(--success);
  }
  .product-stock.low { color: var(--warn); }
  .product-stock.out { color: var(--danger); }

  .qty-chip {
    position: absolute;
    top: 10px; right: 10px;
    background: var(--purple);
    color: white;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 8px;
    display: none;
  }
  .qty-chip.show { display: block; }

  /* Cart drawer */
  .cart-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
    backdrop-filter: blur(4px);
  }
  .cart-overlay.open { opacity: 1; pointer-events: all; }

  .cart-drawer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    z-index: 201;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.32,.72,0,1);
    max-height: 90dvh;
    display: flex;
    flex-direction: column;
  }
  .cart-drawer.open { transform: translateY(0); }

  .drawer-handle {
    width: 40px; height: 4px;
    background: rgba(255,255,255,.2);
    border-radius: 2px;
    margin: 12px auto 0;
    flex-shrink: 0;
  }

  .drawer-header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,.07);
  }
  .drawer-title { font-size: 18px; font-weight: 700; }

  .clear-btn {
    font-size: 13px;
    color: var(--pink);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
  }

  .cart-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px 20px;
    overscroll-behavior: contain;
  }

  .cart-empty {
    text-align: center;
    padding: 40px 0;
    color: var(--text-muted);
    font-size: 15px;
  }

  .cart-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .cart-item:last-child { border-bottom: none; }

  .ci-avatar {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 800;
    color: white;
    flex-shrink: 0;
  }
  .ci-info { flex: 1; min-width: 0; }
  .ci-name { font-size: 14px; font-weight: 600; }
  .ci-price { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .ci-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .qty-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: none;
    background: var(--surface2);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    line-height: 1;
  }
  .qty-btn:active { background: var(--purple); }
  .qty-num { font-size: 16px; font-weight: 700; min-width: 26px; text-align: center; }

  /* Footer / totals */
  .cart-footer {
    padding: 16px 20px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    border-top: 1px solid rgba(255,255,255,.08);
    flex-shrink: 0;
    background: var(--surface);
  }

  .totals-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .totals-label { font-size: 13px; color: var(--text-muted); }
  .totals-value { font-size: 15px; font-weight: 700; }
  .totals-value.profit { color: var(--success); }
  .totals-total .totals-label { font-size: 16px; color: var(--text); font-weight: 600; }
  .totals-total .totals-value { font-size: 22px; color: var(--purple-light); }

  .checkout-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    border: none;
    border-radius: 50px;
    padding: 16px;
    color: white;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 20px rgba(108,63,197,.4);
    margin-top: 6px;
  }
  .checkout-btn:active { opacity: .85; transform: scale(.98); }
  .checkout-btn:disabled { opacity: .4; cursor: default; }

  /* Floating bar */
  .floating-bar {
    position: fixed;
    bottom: 16px;
    left: 16px; right: 16px;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    border-radius: 50px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 8px 30px rgba(108,63,197,.5);
    cursor: pointer;
    transform: translateY(100px);
    opacity: 0;
    transition: transform .3s cubic-bezier(.32,.72,0,1), opacity .25s;
    z-index: 99;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .floating-bar.show { transform: translateY(0); opacity: 1; }

  .fb-left { display: flex; align-items: center; gap: 10px; }
  .fb-count {
    background: rgba(255,255,255,.25);
    border-radius: 50px;
    padding: 4px 10px;
    font-size: 13px;
    font-weight: 700;
  }
  .fb-label { font-size: 15px; font-weight: 600; }
  .fb-total { font-size: 17px; font-weight: 800; }

  /* Receipt */
  .receipt-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 300;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
    backdrop-filter: blur(6px);
  }
  .receipt-overlay.open { opacity: 1; pointer-events: all; }

  .receipt {
    background: #fff;
    color: #111;
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 480px;
    max-height: 90dvh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.32,.72,0,1);
    padding-bottom: max(20px, env(safe-area-inset-bottom));
  }
  .receipt-overlay.open .receipt { transform: translateY(0); }

  .receipt-header {
    background: linear-gradient(135deg, var(--purple-dark), var(--purple));
    color: white;
    padding: 24px;
    border-radius: 24px 24px 0 0;
    text-align: center;
  }
  .receipt-header h2 { font-size: 20px; font-weight: 800; }
  .receipt-header p { font-size: 13px; opacity: .8; margin-top: 4px; }

  .receipt-body { padding: 16px 20px; }

  .receipt-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #888;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px dashed #ddd;
  }

  .receipt-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 14px;
    border-bottom: 1px solid #f0f0f0;
  }
  .rl-name { font-weight: 600; }
  .rl-qty { color: #888; font-size: 12px; }
  .rl-total { font-weight: 700; color: var(--purple-dark); }

  .receipt-footer {
    margin-top: 16px;
    padding: 16px;
    background: #f9f5ff;
    border-radius: 12px;
  }
  .rf-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #666;
    margin-bottom: 6px;
  }
  .rf-row .profit-val { color: var(--success); font-weight: 700; }
  .rf-total {
    display: flex;
    justify-content: space-between;
    font-size: 20px;
    font-weight: 800;
    color: var(--purple-dark);
    margin-top: 10px;
    padding-top: 10px;
    border-top: 2px solid var(--purple-light);
  }

  .receipt-actions {
    padding: 0 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
  }

  .r-btn {
    padding: 14px;
    border-radius: 50px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .r-btn-outline { background: none; border: 2px solid var(--purple); color: var(--purple); }
  .r-btn-fill { background: linear-gradient(135deg, var(--purple), var(--pink)); color: white; }

  /* Stock panel */
  .stock-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 250;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
    backdrop-filter: blur(4px);
  }
  .stock-overlay.open { opacity: 1; pointer-events: all; }

  .stock-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    z-index: 251;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.32,.72,0,1);
    max-height: 90dvh;
    display: flex;
    flex-direction: column;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
  }
  .stock-panel.open { transform: translateY(0); }

  .stock-list { overflow-y: auto; padding: 8px 20px 16px; }

  .stock-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .stock-item:last-child { border-bottom: none; }

  .si-info { flex: 1; }
  .si-name { font-size: 14px; font-weight: 600; }
  .si-detail { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .si-input {
    width: 64px;
    background: var(--surface2);
    border: 1px solid rgba(167,139,250,.25);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    padding: 8px 4px;
    outline: none;
  }

  .stock-summary {
    padding: 12px 20px 4px;
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-muted);
    border-top: 1px solid rgba(255,255,255,.08);
  }
  .stock-summary b { color: var(--text); }

  .no-results {
    text-align: center;
    padding: 40px 0;
    color: var(--text-muted);
    grid-column: 1 / -1;
  }

  /* Sales panel */
  .tab-row { display: flex; gap: 8px; padding: 4px 20px 10px; flex-shrink: 0; }
  .tab-btn {
    flex: 1;
    background: var(--surface2);
    border: 1px solid rgba(167,139,250,.2);
    color: var(--text-muted);
    border-radius: 50px;
    padding: 8px 0;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-btn.active { background: var(--purple); color: white; border-color: var(--purple); }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-tile { background: var(--surface2); border-radius: 14px; padding: 12px; }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
  .stat-value { font-size: 20px; font-weight: 800; margin-top: 4px; }
  .stat-value.profit { color: var(--success); }

  .sales-section { margin-bottom: 16px; }
  .sales-section h3 {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-row .ci-avatar { width: 30px; height: 30px; font-size: 12px; border-radius: 8px; }
  .bar-info { flex: 1; min-width: 0; }
  .bar-top { display: flex; justify-content: space-between; font-size: 13px; }
  .bar-name { font-weight: 600; }
  .bar-val { font-weight: 700; }
  .bar-sub { font-size: 11px; color: var(--text-muted); }
  .bar-track { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; margin-top: 4px; }
  .bar-fill { height: 100%; background: var(--purple-light); border-radius: 4px; }

  .day-chart { display: flex; align-items: flex-end; gap: 6px; height: 100px; }
  .day-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
  .day-bar { width: 100%; background: var(--purple-light); border-radius: 4px 4px 0 0; min-height: 2px; }
  .day-bar.today { background: var(--pink); }
  .day-lbl { font-size: 10px; color: var(--text-muted); }
  .day-val { font-size: 10px; color: var(--text); font-weight: 700; }

  .insight {
    display: flex;
    gap: 10px;
    background: var(--surface2);
    border-radius: 12px;
    padding: 10px 12px;
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.45;
  }
  .insight b { color: var(--purple-light); }
  .insight .tag {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 800;
    color: white;
    background: var(--purple);
    border-radius: 6px;
    padding: 2px 7px;
    height: fit-content;
  }
  .insight.warn .tag { background: var(--warn); color: #1a1030; }
  .insight.warn b { color: var(--warn); }

  .sale-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .sale-row:last-child { border-bottom: none; }
  .sr-ref { font-size: 13px; font-weight: 700; }
  .sr-detail { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .sr-amounts { text-align: right; }
  .sr-total { font-size: 14px; font-weight: 700; }
  .sr-profit { font-size: 11px; color: var(--success); font-weight: 600; }

  .empty-msg { text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px 0; }

  /* PIN modal */
  .pin-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 400;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
    backdrop-filter: blur(6px);
  }
  .pin-overlay.open { opacity: 1; pointer-events: all; }

  .pin-box {
    background: var(--surface);
    border-radius: 20px;
    padding: 24px 20px;
    width: min(300px, 86vw);
    text-align: center;
  }
  .pin-box.shake { animation: shake .35s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
  }
  .pin-title { font-size: 16px; font-weight: 700; }
  .pin-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .pin-dots { display: flex; justify-content: center; gap: 12px; margin: 18px 0; }
  .pin-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid rgba(167,139,250,.3);
  }
  .pin-dot.filled { background: var(--purple-light); border-color: var(--purple-light); }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .pin-key {
    background: var(--surface2);
    border: none;
    border-radius: 14px;
    padding: 14px 0;
    color: var(--text);
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .pin-key:active { background: var(--purple); }
  .pin-key.ghost { background: none; font-size: 14px; color: var(--text-muted); }
  .pin-cancel {
    margin-top: 14px;
    background: none;
    border: none;
    color: var(--pink);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(167,139,250,.3); border-radius: 2px; }

  @media (min-width: 480px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <span class="brand">Maalem</span>
    <span class="page">Caisse <span class="sync-chip" id="syncChip" onclick="syncDiag(event)">Local</span></span>
  </div>
  <div class="header-actions">
    <button class="hdr-btn" onclick="openSales()">Ventes</button>
    <button class="hdr-btn" onclick="openStock()">Stock</button>
    <button class="hdr-btn" onclick="openCart()">
      Panier
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
/* ── Supabase config ──
   Fill these two values to enable multi-device sync.
   Left empty, the app runs in local-only mode (data stays on this phone). */
const SUPABASE_URL = 'https://azwqjykswiapblubssgj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_lW5nElPSQBg_F3FeSKpONw_4tth6nCt';

// cost = purchase cost per piece, price = selling price per piece
// perCarton = pieces per carton, initialStock = current inventory in pieces
let PRODUCTS = [
  { id: 1, name: 'Platsch',    cost: 3.31,  price: 6,  perCarton: 32, initialStock: 96,  color: '#8b5cf6' },
  { id: 2, name: 'Scooby Doo', cost: 2.50,  price: 6,  perCarton: 40, initialStock: 80,  color: '#ec4899' },
  { id: 3, name: 'Cornion',    cost: 2.50,  price: 5,  perCarton: 40, initialStock: 120, color: '#06b6d4' },
  { id: 4, name: 'Bay Bino',   cost: 5.00,  price: 10, perCarton: 24, initialStock: 48,  color: '#f59e0b' },
  { id: 5, name: 'Leone',      cost: 10.00, price: 15, perCarton: 25, initialStock: 75,  color: '#10b981' },
  { id: 6, name: 'Classico',   cost: 12.00, price: 17, perCarton: 22, initialStock: 22,  color: '#6366f1' },
  { id: 7, name: 'Yosse',      cost: 4.17,  price: 10, perCarton: 24, initialStock: 72,  color: '#f43f5e' },
  { id: 8, name: 'Solero',     cost: 12.00, price: 20, perCarton: 25, initialStock: 50,  color: '#f97316' },
  { id: 9, name: 'Magnum',     cost: 17.50, price: 23, perCarton: 20, initialStock: 80,  color: '#a16207' },
];

const LOW_STOCK = 15;

let cart = {}; // { productId: pieces }
let orderCount = parseInt(localStorage.getItem('maalem_orders') || '0');
let stock = loadStock();
let salesLog = loadSales();
let salesPeriod = 'today';

function loadSales() {
  try {
    const s = JSON.parse(localStorage.getItem('maalem_sales'));
    return Array.isArray(s) ? s : [];
  } catch (e) { return []; }
}
function saveSales() {
  localStorage.setItem('maalem_sales', JSON.stringify(salesLog.slice(-1000)));
}

/* ── Remote sync (Supabase) ── */
let db = null;
let dbOnline = false;

// stable per-device id so a phone ignores the realtime echo of its own sales
let DEVICE_ID = localStorage.getItem('maalem_device');
if (!DEVICE_ID) {
  DEVICE_ID = 'dev-' + Math.random().toString(36).slice(2, 10);
  localStorage.setItem('maalem_device', DEVICE_ID);
}

function loadPending() {
  try {
    const p = JSON.parse(localStorage.getItem('maalem_pending'));
    return Array.isArray(p) ? p : [];
  } catch (e) { return []; }
}
let pendingSales = loadPending();
function savePending() {
  localStorage.setItem('maalem_pending', JSON.stringify(pendingSales));
}

function setSyncChip() {
  const chip = document.getElementById('syncChip');
  if (!db) { chip.textContent = 'Local'; chip.className = 'sync-chip'; return; }
  if (!dbOnline) { chip.textContent = 'Hors ligne'; chip.className = 'sync-chip'; return; }
  if (pendingSales.length) {
    chip.textContent = pendingSales.length + ' en attente';
    chip.className = 'sync-chip pending';
  } else {
    chip.textContent = 'Sync';
    chip.className = 'sync-chip online';
  }
}

async function initRemote() {
  if (!SUPABASE_URL || !SUPABASE_ANON_KEY || !window.supabase) { setSyncChip(); return; }
  try {
    db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let { data: rows, error } = await db.from('products').select('*').order('id');
    if (error) throw error;

    if (!rows || rows.length === 0) {
      // first run: seed the database from the built-in list
      const seed = PRODUCTS.map(p => ({
        id: p.id, name: p.name, cost: p.cost, price: p.price,
        per_carton: p.perCarton, initial_stock: p.initialStock,
        stock: stock[p.id] ?? p.initialStock, color: p.color
      }));
      const { error: seedErr } = await db.from('products').insert(seed);
      if (seedErr) throw seedErr;
      rows = seed;
    }

    applyRemoteProducts(rows);

    const { data: saleRows, error: salesErr } = await db.from('sales')
      .select('*').order('id', { ascending: false }).limit(1000);
    if (salesErr) throw salesErr;
    salesLog = (saleRows || []).reverse().map(r => ({
      ref: r.client_ref ?? r.id,
      ts: Date.parse(r.created_at),
      total: Number(r.total), profit: Number(r.profit),
      pieces: r.pieces, items: r.items
    }));
    saveSales();

    dbOnline = true;
    await flushPending();

    // live updates from other phones
    db.channel('pos-sync')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'products' }, payload => {
        if (payload.new && payload.new.id) {
          stock[payload.new.id] = payload.new.stock;
          saveStock();
          renderProducts(document.querySelector('.search-input').value);
          if (document.getElementById('stockPanel').classList.contains('open')) renderStock();
        }
      })
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'sales' }, payload => {
        const r = payload.new;
        if (r.device === DEVICE_ID) return; // this phone already has its own sale
        salesLog.push({
          ref: r.client_ref ?? r.id, ts: Date.parse(r.created_at),
          total: Number(r.total), profit: Number(r.profit),
          pieces: r.pieces, items: r.items
        });
        saveSales();
        if (document.getElementById('salesPanel').classList.contains('open')) renderSales();
      })
      .subscribe();

    renderProducts(document.querySelector('.search-input').value);
  } catch (e) {
    dbOnline = false;
    console.warn('Supabase indisponible, mode local:', e.message || e);
  }
  setSyncChip();
}

function applyRemoteProducts(rows) {
  PRODUCTS = rows.map(r => ({
    id: r.id, name: r.name, cost: Number(r.cost), price: Number(r.price),
    perCarton: r.per_carton, initialStock: r.initial_stock, color: r.color
  }));
  const s = {};
  rows.forEach(r => s[r.id] = r.stock);
  stock = s;
  saveStock();
}

let pushInFlight = 0;

async function pushSaleRemote(sale) {
  if (!db) return;
  pushInFlight++;
  try {
    const { error } = await db.rpc('record_sale', {
      p_client_ref: sale.ref, p_device: DEVICE_ID, p_total: sale.total,
      p_profit: sale.profit, p_pieces: sale.pieces, p_items: sale.items
    });
    if (error) throw error;
    dbOnline = true;
  } catch (e) {
    dbOnline = false;
    pendingSales.push(sale);
    savePending();
  } finally {
    pushInFlight--;
  }
  setSyncChip();
}

/* Poll the database so devices stay in sync even when realtime
   websockets are blocked by the network */
async function refreshRemote() {
  if (!db || document.hidden || pushInFlight > 0) return;
  try {
    const { data: rows, error } = await db.from('products').select('*').order('id');
    if (error) throw error;
    if (rows && rows.length) {
      applyRemoteProducts(rows);
      renderProducts(document.querySelector('.search-input').value);
      if (document.getElementById('stockPanel').classList.contains('open')) renderStock();
    }

    const { data: saleRows, error: e2 } = await db.from('sales')
      .select('*').order('id', { ascending: false }).limit(1000);
    if (e2) throw e2;
    const dbSales = (saleRows || []).reverse().map(r => ({
      ref: r.client_ref ?? r.id,
      ts: Date.parse(r.created_at),
      total: Number(r.total), profit: Number(r.profit),
      pieces: r.pieces, items: r.items
    }));
    // keep offline sales that have not reached the database yet
    salesLog = dbSales.concat(pendingSales);
    saveSales();
    if (document.getElementById('salesPanel').classList.contains('open')) renderSales();

    dbOnline = true;
    if (pendingSales.length) flushPending();
  } catch (e) {
    dbOnline = false;
  }
  setSyncChip();
}

async function flushPending() {
  if (!db || !pendingSales.length) return;
  const queue = pendingSales.slice();
  for (const sale of queue) {
    try {
      const { error } = await db.rpc('record_sale', {
        p_client_ref: sale.ref, p_device: DEVICE_ID, p_total: sale.total,
        p_profit: sale.profit, p_pieces: sale.pieces, p_items: sale.items
      });
      if (error) throw error;
      pendingSales.shift();
      savePending();
      dbOnline = true;
    } catch (e) {
      dbOnline = false;
      break;
    }
  }
  setSyncChip();
}

/* Tap the sync chip to see exactly what is failing */
async function syncDiag(ev) {
  if (ev) ev.stopPropagation();
  if (!window.supabase) { alert('Diagnostic:\n\nLa librairie Supabase ne charge pas (connexion internet ?)'); return; }
  if (!db) { alert('Diagnostic:\n\nMode local — configuration Supabase absente'); return; }
  const msg = [];

  try {
    const { data, error } = await db.from('products').select('id');
    if (error) msg.push('Table products: ERREUR — ' + (error.message || error.code));
    else msg.push('Table products: OK (' + data.length + ' produits)');
  } catch (e) { msg.push('Table products: ERREUR réseau — ' + (e.message || e)); }

  try {
    const { data, error } = await db.from('sales').select('id').limit(1);
    if (error) msg.push('Table sales: ERREUR — ' + (error.message || error.code));
    else msg.push('Table sales: OK');
  } catch (e) { msg.push('Table sales: ERREUR réseau — ' + (e.message || e)); }

  try {
    const { error } = await db.rpc('record_sale', {
      p_client_ref: 0, p_device: 'diagnostic', p_total: 0,
      p_profit: 0, p_pieces: 0, p_items: []
    });
    if (error) msg.push('Fonction record_sale: ERREUR — ' + (error.message || error.code));
    else {
      msg.push('Fonction record_sale: OK');
      await db.from('sales').delete().eq('device', 'diagnostic');
    }
  } catch (e) { msg.push('Fonction record_sale: ERREUR — ' + (e.message || e)); }

  alert('Diagnostic sync:\n\n' + msg.join('\n\n'));
  refreshRemote();
}

async function pushStockRemote(id, value) {
  if (!db) return;
  try {
    const { error } = await db.from('products').update({ stock: value }).eq('id', id);
    if (error) throw error;
    dbOnline = true;
  } catch (e) { dbOnline = false; }
  setSyncChip();
}

function loadStock() {
  try {
    const saved = JSON.parse(localStorage.getItem('maalem_stock'));
    if (saved && typeof saved === 'object') {
      const s = {};
      PRODUCTS.forEach(p => {
        s[p.id] = Number.isFinite(saved[p.id]) ? saved[p.id] : p.initialStock;
      });
      return s;
    }
  } catch (e) {}
  const s = {};
  PRODUCTS.forEach(p => s[p.id] = p.initialStock);
  return s;
}

function saveStock() {
  localStorage.setItem('maalem_stock', JSON.stringify(stock));
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function getTotal() {
  return PRODUCTS.reduce((sum, p) => sum + (cart[p.id] || 0) * p.price, 0);
}
function getProfit() {
  return PRODUCTS.reduce((sum, p) => sum + (cart[p.id] || 0) * (p.price - p.cost), 0);
}
function getTotalPieces() {
  return Object.values(cart).reduce((s, q) => s + q, 0);
}
function fmt(n) {
  return (Math.round(n * 100) / 100).toLocaleString('fr-MA') + ' DH';
}

function addToCart(id) {
  const inCart = cart[id] || 0;
  if (inCart >= (stock[id] || 0)) {
    if (navigator.vibrate) navigator.vibrate([60, 40, 60]);
    return;
  }
  cart[id] = inCart + 1;
  updateUI();
  if (navigator.vibrate) navigator.vibrate(15);
}

function removeFromCart(id) {
  if (!cart[id]) return;
  cart[id]--;
  if (cart[id] === 0) delete cart[id];
  updateUI();
  if (navigator.vibrate) navigator.vibrate(15);
}

function clearCart() {
  cart = {};
  updateUI();
  closeCart();
}

function stockClass(q) {
  if (q <= 0) return 'out';
  if (q <= LOW_STOCK) return 'low';
  return '';
}
function stockLabel(q) {
  if (q <= 0) return 'Rupture de stock';
  return 'Stock: ' + q + ' pcs';
}

function updateUI() {
  const total = getTotal();
  const pieces = getTotalPieces();
  const itemCount = Object.keys(cart).length;

  const badge = document.getElementById('cartBadge');
  badge.textContent = itemCount;
  badge.classList.toggle('show', itemCount > 0);

  const bar = document.getElementById('floatingBar');
  bar.classList.toggle('show', pieces > 0);
  document.getElementById('fbCount').textContent = pieces + ' pcs';
  document.getElementById('fbTotal').textContent = fmt(total);

  document.getElementById('totalPieces').textContent = pieces;
  document.getElementById('totalProfit').textContent = '+' + fmt(getProfit());
  document.getElementById('totalAmount').textContent = fmt(total);
  document.getElementById('checkoutBtn').disabled = pieces === 0;

  PRODUCTS.forEach(p => {
    const chip = document.querySelector(`.qty-chip[data-id="${p.id}"]`);
    const card = document.querySelector(`.product-card[data-id="${p.id}"]`);
    if (!chip || !card) return;
    const q = cart[p.id] || 0;
    chip.textContent = q;
    chip.classList.toggle('show', q > 0);
    card.classList.toggle('in-cart', q > 0);
  });

  renderCartList();
}

function renderCartList() {
  const list = document.getElementById('cartList');
  const items = PRODUCTS.filter(p => cart[p.id]);

  if (items.length === 0) {
    list.innerHTML = `<div class="cart-empty">Panier vide<br>Ajoutez des produits</div>`;
    return;
  }

  list.innerHTML = items.map(p => `
    <div class="cart-item">
      <div class="ci-avatar" style="background:${p.color}">${initials(p.name)}</div>
      <div class="ci-info">
        <div class="ci-name">${p.name}</div>
        <div class="ci-price">${p.price} DH/pc · <b>${fmt(cart[p.id] * p.price)}</b></div>
      </div>
      <div class="ci-controls">
        <button class="qty-btn" onclick="removeFromCart(${p.id})">&minus;</button>
        <span class="qty-num">${cart[p.id]}</span>
        <button class="qty-btn" onclick="addToCart(${p.id})">+</button>
      </div>
    </div>
  `).join('');
}

function renderProducts(query = '') {
  const grid = document.getElementById('productGrid');
  const q = query.trim().toLowerCase();
  const filtered = q ? PRODUCTS.filter(p => p.name.toLowerCase().includes(q)) : PRODUCTS;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-results">Aucun produit trouvé</div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const s = stock[p.id] || 0;
    return `
    <div class="product-card ${s <= 0 ? 'out-of-stock' : ''}" data-id="${p.id}" onclick="addToCart(${p.id})">
      <span class="qty-chip" data-id="${p.id}">${cart[p.id] || 0}</span>
      <div class="product-avatar" style="background:${p.color}">${initials(p.name)}</div>
      <div class="product-name">${p.name}</div>
      <div class="product-price">Pièce: <span>${p.price} DH</span></div>
      <div class="product-stock ${stockClass(s)}">${stockLabel(s)}</div>
    </div>
  `}).join('');
  updateUI();
}

function openCart() {
  document.getElementById('cartOverlay').classList.add('open');
  document.getElementById('cartDrawer').classList.add('open');
  document.body.style.overflow = 'hidden';
  renderCartList();
}
function closeCart() {
  document.getElementById('cartOverlay').classList.remove('open');
  document.getElementById('cartDrawer').classList.remove('open');
  document.body.style.overflow = '';
}

function checkout() {
  const items = PRODUCTS.filter(p => cart[p.id]);
  if (!items.length) return;

  orderCount++;
  localStorage.setItem('maalem_orders', orderCount);

  // decrement stock
  items.forEach(p => {
    stock[p.id] = Math.max(0, (stock[p.id] || 0) - cart[p.id]);
  });
  saveStock();

  // record sale
  const sale = {
    ref: orderCount,
    ts: Date.now(),
    total: getTotal(),
    profit: getProfit(),
    pieces: getTotalPieces(),
    items: items.map(p => ({ id: p.id, name: p.name, qty: cart[p.id], price: p.price }))
  };
  salesLog.push(sale);
  saveSales();
  pushSaleRemote(sale);

  const now = new Date();
  const dateStr = now.toLocaleDateString('fr-MA', { day: '2-digit', month: '2-digit', year: 'numeric' });
  const timeStr = now.toLocaleTimeString('fr-MA', { hour: '2-digit', minute: '2-digit' });

  document.getElementById('receiptDate').textContent = dateStr + ' — ' + timeStr;
  document.getElementById('receiptRef').textContent = 'Vente #' + String(orderCount).padStart(4, '0');

  document.getElementById('receiptLines').innerHTML = items.map(p => `
    <div class="receipt-line">
      <div>
        <div class="rl-name">${p.name}</div>
        <div class="rl-qty">${cart[p.id]} pc${cart[p.id] > 1 ? 's' : ''} &times; ${p.price} DH</div>
      </div>
      <div class="rl-total">${fmt(cart[p.id] * p.price)}</div>
    </div>
  `).join('');

  document.getElementById('rPieces').textContent = getTotalPieces() + ' pcs';
  document.getElementById('rProfit').textContent = '+' + fmt(getProfit());
  document.getElementById('rTotal').textContent = fmt(getTotal());

  closeCart();
  document.getElementById('receiptOverlay').classList.add('open');
  if (navigator.vibrate) navigator.vibrate([50, 30, 80]);
}

function closeReceipt() {
  document.getElementById('receiptOverlay').classList.remove('open');
  cart = {};
  renderProducts(document.querySelector('.search-input').value);
}

function newOrder() {
  closeReceipt();
}

/* PIN gate */
const PIN_CODE = '9421';
let pinUnlocked = false;
let pinTarget = null;
let pinEntry = '';

function requirePin(target) {
  if (pinUnlocked) { openProtected(target); return; }
  pinTarget = target;
  pinEntry = '';
  renderPinDots();
  document.getElementById('pinSub').textContent =
    target === 'stock' ? 'Accès au stock' : 'Accès aux ventes';
  document.getElementById('pinOverlay').classList.add('open');
}
function openProtected(t) {
  t === 'stock' ? doOpenStock() : doOpenSales();
}
function pinKey(d) {
  if (pinEntry.length >= 4) return;
  pinEntry += d;
  renderPinDots();
  if (pinEntry.length === 4) {
    if (pinEntry === PIN_CODE) {
      pinUnlocked = true;
      closePin();
      openProtected(pinTarget);
      if (navigator.vibrate) navigator.vibrate(30);
    } else {
      const box = document.getElementById('pinBox');
      box.classList.add('shake');
      if (navigator.vibrate) navigator.vibrate([60, 40, 60]);
      setTimeout(() => {
        box.classList.remove('shake');
        pinEntry = '';
        renderPinDots();
      }, 380);
    }
  }
}
function pinBack() { pinEntry = pinEntry.slice(0, -1); renderPinDots(); }
function pinClear() { pinEntry = ''; renderPinDots(); }
function renderPinDots() {
  document.getElementById('pinDots').innerHTML =
    [0, 1, 2, 3].map(i => `<div class="pin-dot ${i < pinEntry.length ? 'filled' : ''}"></div>`).join('');
}
function closePin() {
  document.getElementById('pinOverlay').classList.remove('open');
}

/* Stock panel */
function openStock() { requirePin('stock'); }
function doOpenStock() {
  renderStock();
  document.getElementById('stockOverlay').classList.add('open');
  document.getElementById('stockPanel').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeStock() {
  document.getElementById('stockOverlay').classList.remove('open');
  document.getElementById('stockPanel').classList.remove('open');
  document.body.style.overflow = '';
  renderProducts(document.querySelector('.search-input').value);
}

function renderStock() {
  const list = document.getElementById('stockList');
  list.innerHTML = PRODUCTS.map(p => {
    const s = stock[p.id] || 0;
    const cartons = (s / p.perCarton).toFixed(1).replace(/\.0$/, '');
    return `
    <div class="stock-item">
      <div class="ci-avatar" style="background:${p.color}">${initials(p.name)}</div>
      <div class="si-info">
        <div class="si-name">${p.name}</div>
        <div class="si-detail">${p.perCarton} pcs/carton · &asymp;${cartons} cartons · achat ${p.cost} DH · vente ${p.price} DH</div>
      </div>
      <input class="si-input" type="number" min="0" inputmode="numeric" value="${s}"
        onchange="setStock(${p.id}, this.value)">
    </div>
  `}).join('');
  updateStockSummary();
}

function updateStockSummary() {
  const value = PRODUCTS.reduce((sum, p) => sum + (stock[p.id] || 0) * p.price, 0);
  const pieces = PRODUCTS.reduce((sum, p) => sum + (stock[p.id] || 0), 0);
  document.getElementById('stockValue').textContent = fmt(value);
  document.getElementById('stockPieces').textContent = pieces + ' pcs';
}

function setStock(id, value) {
  const v = Math.max(0, parseInt(value) || 0);
  stock[id] = v;
  saveStock();
  updateStockSummary();
  pushStockRemote(id, v);
}

function resetStock() {
  if (!confirm('Remettre le stock aux quantités initiales ?')) return;
  PRODUCTS.forEach(p => {
    stock[p.id] = p.initialStock;
    pushStockRemote(p.id, p.initialStock);
  });
  saveStock();
  renderStock();
}

/* Sales panel */
function openSales() { requirePin('sales'); }
function doOpenSales() {
  renderSales();
  document.getElementById('salesOverlay').classList.add('open');
  document.getElementById('salesPanel').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSales() {
  document.getElementById('salesOverlay').classList.remove('open');
  document.getElementById('salesPanel').classList.remove('open');
  document.body.style.overflow = '';
}

function setPeriod(p) {
  salesPeriod = p;
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.period === p));
  renderSales();
}

function startOfDay(ts) {
  const d = new Date(ts);
  d.setHours(0, 0, 0, 0);
  return d.getTime();
}

function filterSales() {
  if (salesPeriod === 'today') {
    const t0 = startOfDay(Date.now());
    return salesLog.filter(s => s.ts >= t0);
  }
  if (salesPeriod === 'week') {
    const t0 = startOfDay(Date.now()) - 6 * 86400000;
    return salesLog.filter(s => s.ts >= t0);
  }
  return salesLog;
}

function aggregateByProduct(sales) {
  const agg = {};
  sales.forEach(s => s.items.forEach(it => {
    const p = PRODUCTS.find(x => x.id === it.id);
    if (!p) return;
    if (!agg[it.id]) agg[it.id] = { product: p, qty: 0, revenue: 0, profit: 0 };
    agg[it.id].qty += it.qty;
    agg[it.id].revenue += it.qty * it.price;
    agg[it.id].profit += it.qty * (it.price - p.cost);
  }));
  return Object.values(agg);
}

function computeInsights(filtered) {
  const ins = [];
  if (filtered.length) {
    const arr = aggregateByProduct(filtered);
    const topProfit = arr.slice().sort((a, b) => b.profit - a.profit)[0];
    if (topProfit) {
      ins.push({ tag: 'TOP', text: `<b>${topProfit.product.name}</b> rapporte le plus de bénéfice : <b>${fmt(topProfit.profit)}</b> (${topProfit.qty} pcs)` });
    }
    const totalRev = filtered.reduce((s, x) => s + x.total, 0);
    const totalProf = filtered.reduce((s, x) => s + x.profit, 0);
    const avg = totalRev / filtered.length;
    const margin = totalRev > 0 ? Math.round(100 * totalProf / totalRev) : 0;
    ins.push({ tag: 'MOY', text: `Panier moyen : <b>${fmt(avg)}</b> · marge moyenne <b>${margin}%</b>` });
  }

  // stock-out projection from last 7 days of sales
  const weekAgo = startOfDay(Date.now()) - 6 * 86400000;
  const sold7 = {};
  salesLog.filter(s => s.ts >= weekAgo).forEach(s =>
    s.items.forEach(it => { sold7[it.id] = (sold7[it.id] || 0) + it.qty; }));
  let urgent = null;
  PRODUCTS.forEach(p => {
    const rate = (sold7[p.id] || 0) / 7;
    if (rate > 0 && (stock[p.id] || 0) > 0) {
      const days = Math.floor((stock[p.id] || 0) / rate);
      if (urgent === null || days < urgent.days) urgent = { name: p.name, days };
    }
  });
  if (urgent && urgent.days <= 10) {
    ins.push({ tag: '!', warn: true, text: `Au rythme actuel, <b>${urgent.name}</b> sera épuisé dans ~${urgent.days} jour${urgent.days > 1 ? 's' : ''} — pensez à recommander` });
  }

  const outs = PRODUCTS.filter(p => (stock[p.id] || 0) <= 0).map(p => p.name);
  const lows = PRODUCTS.filter(p => (stock[p.id] || 0) > 0 && stock[p.id] <= LOW_STOCK).map(p => p.name);
  if (outs.length) ins.push({ tag: '!', warn: true, text: `Rupture de stock : <b>${outs.join(', ')}</b>` });
  if (lows.length) ins.push({ tag: '!', warn: true, text: `Stock bas : <b>${lows.join(', ')}</b>` });

  return ins;
}

function renderSales() {
  const el = document.getElementById('salesContent');
  const filtered = filterSales();

  const revenue = filtered.reduce((s, x) => s + x.total, 0);
  const profit = filtered.reduce((s, x) => s + x.profit, 0);
  const pieces = filtered.reduce((s, x) => s + x.pieces, 0);

  let html = `
    <div class="stats-grid">
      <div class="stat-tile"><div class="stat-label">Revenu</div><div class="stat-value">${fmt(revenue)}</div></div>
      <div class="stat-tile"><div class="stat-label">Bénéfice</div><div class="stat-value profit">${fmt(profit)}</div></div>
      <div class="stat-tile"><div class="stat-label">Ventes</div><div class="stat-value">${filtered.length}</div></div>
      <div class="stat-tile"><div class="stat-label">Pièces</div><div class="stat-value">${pieces}</div></div>
    </div>`;

  // Insights
  const insights = computeInsights(filtered);
  if (insights.length) {
    html += `<div class="sales-section"><h3>Analyse</h3>` +
      insights.map(i => `<div class="insight ${i.warn ? 'warn' : ''}"><span class="tag">${i.tag}</span><span>${i.text}</span></div>`).join('') +
      `</div>`;
  }

  // 7-day revenue chart
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d0 = startOfDay(Date.now()) - i * 86400000;
    const d1 = d0 + 86400000;
    const rev = salesLog.filter(s => s.ts >= d0 && s.ts < d1).reduce((s, x) => s + x.total, 0);
    days.push({ d0, rev, isToday: i === 0 });
  }
  const maxRev = Math.max(...days.map(d => d.rev), 1);
  html += `<div class="sales-section"><h3>Revenu — 7 derniers jours</h3><div class="day-chart">` +
    days.map(d => {
      const h = Math.round(70 * d.rev / maxRev);
      const lbl = new Date(d.d0).toLocaleDateString('fr-MA', { weekday: 'short' });
      return `<div class="day-col">
        ${d.rev > 0 ? `<span class="day-val">${Math.round(d.rev)}</span>` : ''}
        <div class="day-bar ${d.isToday ? 'today' : ''}" style="height:${Math.max(h, d.rev > 0 ? 4 : 2)}px"></div>
        <span class="day-lbl">${lbl}</span>
      </div>`;
    }).join('') + `</div></div>`;

  // Best sellers
  const ranking = aggregateByProduct(filtered).sort((a, b) => b.revenue - a.revenue).slice(0, 5);
  if (ranking.length) {
    const maxR = ranking[0].revenue || 1;
    html += `<div class="sales-section"><h3>Meilleures ventes</h3>` +
      ranking.map(r => `
        <div class="bar-row">
          <div class="ci-avatar" style="background:${r.product.color}">${initials(r.product.name)}</div>
          <div class="bar-info">
            <div class="bar-top">
              <span class="bar-name">${r.product.name}</span>
              <span class="bar-val">${fmt(r.revenue)}</span>
            </div>
            <div class="bar-sub">${r.qty} pcs · bénéfice ${fmt(r.profit)}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(100 * r.revenue / maxR)}%"></div></div>
          </div>
        </div>`).join('') + `</div>`;
  }

  // Recent sales
  const recent = filtered.slice(-10).reverse();
  html += `<div class="sales-section"><h3>Dernières ventes</h3>` +
    (recent.length === 0
      ? `<div class="empty-msg">Aucune vente sur cette période</div>`
      : recent.map(s => {
          const d = new Date(s.ts);
          const isToday = startOfDay(s.ts) === startOfDay(Date.now());
          const when = (isToday ? '' : d.toLocaleDateString('fr-MA', { day: '2-digit', month: '2-digit' }) + ' ') +
            d.toLocaleTimeString('fr-MA', { hour: '2-digit', minute: '2-digit' });
          const summary = s.items.map(it => `${it.qty} ${it.name}`).join(', ');
          return `<div class="sale-row">
            <div>
              <div class="sr-ref">#${String(s.ref).padStart(4, '0')} · ${when}</div>
              <div class="sr-detail">${summary}</div>
            </div>
            <div class="sr-amounts">
              <div class="sr-total">${fmt(s.total)}</div>
              <div class="sr-profit">+${fmt(s.profit)}</div>
            </div>
          </div>`;
        }).join('')) + `</div>`;

  el.innerHTML = html;
}

async function clearSales() {
  if (!confirm('Effacer tout l\'historique des ventes ?')) return;
  salesLog = [];
  pendingSales = [];
  saveSales();
  savePending();
  if (db) {
    try { await db.from('sales').delete().gt('id', 0); } catch (e) {}
  }
  setSyncChip();
  renderSales();
}

// Swipe down to close panels
[['cartDrawer', closeCart], ['stockPanel', closeStock], ['salesPanel', closeSales]].forEach(([id, closeFn]) => {
  let startY = 0;
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
  el.addEventListener('touchmove', e => {
    if (e.target.closest('.cart-list, .stock-list')) return;
    if (e.touches[0].clientY - startY > 60) closeFn();
  }, { passive: true });
});

renderProducts();
updateUI();
setSyncChip();
initRemote();

// keep devices in sync: poll every 10s and refresh when the app returns to the foreground
setInterval(refreshRemote, 10000);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) { refreshRemote(); }
});
window.addEventListener('online', refreshRemote);
</script>
