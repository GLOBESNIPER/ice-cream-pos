<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Maalem POS</title>
<meta name="theme-color" content="#6c3fc5">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple: #6c3fc5;
    --purple-light: #8b5cf6;
    --purple-dark: #4c1d95;
    --pink: #ec4899;
    --bg: #0f0a1e;
    --surface: #1a1030;
    --surface2: #251848;
    --card: #2d1f5e;
    --card-hover: #3a2778;
    --text: #f3e8ff;
    --text-muted: #a78bfa;
    --success: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --radius: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(135deg, var(--purple-dark), var(--purple));
    padding: 14px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 20px rgba(108,63,197,.4);
  }

  .header-title { display: flex; flex-direction: column; }
  .header-title .brand { font-size: 11px; opacity: .7; letter-spacing: .1em; text-transform: uppercase; }
  .header-title .page  { font-size: 18px; font-weight: 700; }

  .header-actions { display: flex; gap: 8px; }

  .hdr-btn {
    position: relative;
    background: rgba(255,255,255,.15);
    border: none;
    border-radius: 50px;
    padding: 8px 14px;
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .hdr-btn:active { background: rgba(255,255,255,.25); }

  .cart-badge {
    position: absolute;
    top: -5px; right: -5px;
    background: var(--pink);
    color: white;
    border-radius: 50%;
    width: 20px; height: 20px;
    font-size: 11px;
    font-weight: 700;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .cart-badge.show { display: flex; }

  /* Search */
  .search-wrap { padding: 12px 16px 0; }
  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid rgba(167,139,250,.2);
    border-radius: 50px;
    padding: 10px 16px;
    color: var(--text);
    font-size: 15px;
    outline: none;
  }
  .search-input::placeholder { color: var(--text-muted); }

  /* Products */
  .products-section { padding: 12px 16px 180px; }

  .section-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .product-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: transform .1s, border-color .15s, background .15s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
    user-select: none;
  }
  .product-card:active {
    transform: scale(.96);
    background: var(--card-hover);
    border-color: var(--purple-light);
  }
  .product-card.in-cart { border-color: rgba(139,92,246,.5); }
  .product-card.out-of-stock { opacity: .45; }

  .product-avatar {
    width: 42px; height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    font-weight: 800;
    color: white;
    margin-bottom: 10px;
  }

  .product-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .product-price { font-size: 13px; color: var(--text-muted); font-weight: 500; }
  .product-price span { color: var(--purple-light); font-weight: 700; }

  .product-stock {
    font-size: 11px;
    margin-top: 6px;
    font-weight: 600;
    color: var(--success);
  }
  .product-stock.low { color: var(--warn); }
  .product-stock.out { color: var(--danger); }

  .qty-chip {
    position: absolute;
    top: 10px; right: 10px;
    background: var(--purple);
    color: white;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 8px;
    display: none;
  }
  .qty-chip.show { display: block; }

  /* Cart drawer */
  .cart-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
    backdrop-filter: blur(4px);
  }
  .cart-overlay.open { opacity: 1; pointer-events: all; }

  .cart-drawer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    z-index: 201;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.32,.72,0,1);
    max-height: 90dvh;
    display: flex;
    flex-direction: column;
  }
  .cart-drawer.open { transform: translateY(0); }

  .drawer-handle {
    width: 40px; height: 4px;
    background: rgba(255,255,255,.2);
    border-radius: 2px;
    margin: 12px auto 0;
    flex-shrink: 0;
  }

  .drawer-header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,.07);
  }
  .drawer-title { font-size: 18px; font-weight: 700; }

  .clear-btn {
    font-size: 13px;
    color: var(--pink);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
  }

  .cart-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px 20px;
    overscroll-behavior: contain;
  }

  .cart-empty {
    text-align: center;
    padding: 40px 0;
    color: var(--text-muted);
    font-size: 15px;
  }

  .cart-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .cart-item:last-child { border-bottom: none; }

  .ci-avatar {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 800;
    color: white;
    flex-shrink: 0;
  }
  .ci-info { flex: 1; min-width: 0; }
  .ci-name { font-size: 14px; font-weight: 600; }
  .ci-price { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .ci-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .qty-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: none;
    background: var(--surface2);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    line-height: 1;
  }
  .qty-btn:active { background: var(--purple); }
  .qty-num { font-size: 16px; font-weight: 700; min-width: 26px; text-align: center; }

  /* Footer / totals */
  .cart-footer {
    padding: 16px 20px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    border-top: 1px solid rgba(255,255,255,.08);
    flex-shrink: 0;
    background: var(--surface);
  }

  .totals-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .totals-label { font-size: 13px; color: var(--text-muted); }
  .totals-value { font-size: 15px; font-weight: 700; }
  .totals-value.profit { color: var(--success); }
  .totals-total .totals-label { font-size: 16px; color: var(--text); font-weight: 600; }
  .totals-total .totals-value { font-size: 22px; color: var(--purple-light); }

  .checkout-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    border: none;
    border-radius: 50px;
    padding: 16px;
    color: white;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 20px rgba(108,63,197,.4);
    margin-top: 6px;
  }
  .checkout-btn:active { opacity: .85; transform: scale(.98); }
  .checkout-btn:disabled { opacity: .4; cursor: default; }

  /* Floating bar */
  .floating-bar {
    position: fixed;
    bottom: 16px;
    left: 16px; right: 16px;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    border-radius: 50px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 8px 30px rgba(108,63,197,.5);
    cursor: pointer;
    transform: translateY(100px);
    opacity: 0;
    transition: transform .3s cubic-bezier(.32,.72,0,1), opacity .25s;
    z-index: 99;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .floating-bar.show { transform: translateY(0); opacity: 1; }

  .fb-left { display: flex; align-items: center; gap: 10px; }
  .fb-count {
    background: rgba(255,255,255,.25);
    border-radius: 50px;
    padding: 4px 10px;
    font-size: 13px;
    font-weight: 700;
  }
  .fb-label { font-size: 15px; font-weight: 600; }
  .fb-total { font-size: 17px; font-weight: 800; }

  /* Receipt */
  .receipt-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 300;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
    backdrop-filter: blur(6px);
  }
  .receipt-overlay.open { opacity: 1; pointer-events: all; }

  .receipt {
    background: #fff;
    color: #111;
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 480px;
    max-height: 90dvh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.32,.72,0,1);
    padding-bottom: max(20px, env(safe-area-inset-bottom));
  }
  .receipt-overlay.open .receipt { transform: translateY(0); }

  .receipt-header {
    background: linear-gradient(135deg, var(--purple-dark), var(--purple));
    color: white;
    padding: 24px;
    border-radius: 24px 24px 0 0;
    text-align: center;
  }
  .receipt-header h2 { font-size: 20px; font-weight: 800; }
  .receipt-header p { font-size: 13px; opacity: .8; margin-top: 4px; }

  .receipt-body { padding: 16px 20px; }

  .receipt-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #888;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px dashed #ddd;
  }

  .receipt-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 14px;
    border-bottom: 1px solid #f0f0f0;
  }
  .rl-name { font-weight: 600; }
  .rl-qty { color: #888; font-size: 12px; }
  .rl-total { font-weight: 700; color: var(--purple-dark); }

  .receipt-footer {
    margin-top: 16px;
    padding: 16px;
    background: #f9f5ff;
    border-radius: 12px;
  }
  .rf-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #666;
    margin-bottom: 6px;
  }
  .rf-row .profit-val { color: var(--success); font-weight: 700; }
  .rf-total {
    display: flex;
    justify-content: space-between;
    font-size: 20px;
    font-weight: 800;
    color: var(--purple-dark);
    margin-top: 10px;
    padding-top: 10px;
    border-top: 2px solid var(--purple-light);
  }

  .receipt-actions {
    padding: 0 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
  }

  .r-btn {
    padding: 14px;
    border-radius: 50px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .r-btn-outline { background: none; border: 2px solid var(--purple); color: var(--purple); }
  .r-btn-fill { background: linear-gradient(135deg, var(--purple), var(--pink)); color: white; }

  /* Stock panel */
  .stock-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 250;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
    backdrop-filter: blur(4px);
  }
  .stock-overlay.open { opacity: 1; pointer-events: all; }

  .stock-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    z-index: 251;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.32,.72,0,1);
    max-height: 90dvh;
    display: flex;
    flex-direction: column;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
  }
  .stock-panel.open { transform: translateY(0); }

  .stock-list { overflow-y: auto; padding: 8px 20px 16px; }

  .stock-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .stock-item:last-child { border-bottom: none; }

  .si-info { flex: 1; }
  .si-name { font-size: 14px; font-weight: 600; }
  .si-detail { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .si-input {
    width: 64px;
    background: var(--surface2);
    border: 1px solid rgba(167,139,250,.25);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    padding: 8px 4px;
    outline: none;
  }

  .stock-summary {
    padding: 12px 20px 4px;
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-muted);
    border-top: 1px solid rgba(255,255,255,.08);
  }
  .stock-summary b { color: var(--text); }

  .no-results {
    text-align: center;
    padding: 40px 0;
    color: var(--text-muted);
    grid-column: 1 / -1;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(167,139,250,.3); border-radius: 2px; }

  @media (min-width: 480px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <span class="brand">Maalem</span>
    <span class="page">Caisse</span>
  </div>
  <div class="header-actions">
    <button class="hdr-btn" onclick="openStock()">Stock</button>
    <button class="hdr-btn" onclick="openCart()">
      Panier
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </div>
</header>

<div class="search-wrap">
  <input class="search-input" type="search" placeholder="Rechercher un produit"
    oninput="renderProducts(this.value)" autocomplete="off" autocorrect="off">
</div>

<div class="products-section">
  <div class="section-label">Produits — Prix par pièce</div>
  <div class="grid" id="productGrid"></div>
</div>

<div class="floating-bar" id="floatingBar" onclick="openCart()">
  <div class="fb-left">
    <span class="fb-count" id="fbCount">0</span>
    <span class="fb-label">Voir panier</span>
  </div>
  <span class="fb-total" id="fbTotal">0 DH</span>
</div>

<!-- Cart -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <span class="drawer-title">Panier</span>
    <button class="clear-btn" onclick="clearCart()">Vider</button>
  </div>
  <div class="cart-list" id="cartList"></div>
  <div class="cart-footer">
    <div class="totals-row">
      <span class="totals-label">Pièces</span>
      <span class="totals-value" id="totalPieces">0</span>
    </div>
    <div class="totals-row">
      <span class="totals-label">Bénéfice</span>
      <span class="totals-value profit" id="totalProfit">0 DH</span>
    </div>
    <div class="totals-row totals-total">
      <span class="totals-label">Total</span>
      <span class="totals-value" id="totalAmount">0 DH</span>
    </div>
    <button class="checkout-btn" id="checkoutBtn" onclick="checkout()" disabled>
      Valider la vente
    </button>
  </div>
</div>

<!-- Receipt -->
<div class="receipt-overlay" id="receiptOverlay">
  <div class="receipt">
    <div class="receipt-header">
      <h2>Vente validée</h2>
      <p id="receiptDate"></p>
    </div>
    <div class="receipt-body">
      <div class="receipt-meta">
        <span id="receiptRef"></span>
        <span>Maalem</span>
      </div>
      <div id="receiptLines"></div>
      <div class="receipt-footer">
        <div class="rf-row"><span>Pièces</span><span id="rPieces"></span></div>
        <div class="rf-row"><span>Bénéfice</span><span class="profit-val" id="rProfit"></span></div>
        <div class="rf-total">
          <span>Total</span>
          <span id="rTotal"></span>
        </div>
      </div>
    </div>
    <div class="receipt-actions">
      <button class="r-btn r-btn-outline" onclick="closeReceipt()">Fermer</button>
      <button class="r-btn r-btn-fill" onclick="newOrder()">Nouvelle vente</button>
    </div>
  </div>
</div>

<!-- Stock -->
<div class="stock-overlay" id="stockOverlay" onclick="closeStock()"></div>
<div class="stock-panel" id="stockPanel">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <span class="drawer-title">Stock</span>
    <button class="clear-btn" onclick="resetStock()">Réinitialiser</button>
  </div>
  <div class="stock-list" id="stockList"></div>
  <div class="stock-summary">
    <span>Valeur (vente): <b id="stockValue">0 DH</b></span>
    <span>Total: <b id="stockPieces">0 pcs</b></span>
  </div>
</div>

<script>
// cost = purchase cost per piece, price = selling price per piece
// perCarton = pieces per carton, initialStock = current inventory in pieces
const PRODUCTS = [
  { id: 1, name: 'Platsch',    cost: 3.31,  price: 6,  perCarton: 32, initialStock: 96,  color: '#8b5cf6' },
  { id: 2, name: 'Scooby Doo', cost: 2.50,  price: 6,  perCarton: 40, initialStock: 80,  color: '#ec4899' },
  { id: 3, name: 'Cornion',    cost: 2.50,  price: 5,  perCarton: 40, initialStock: 120, color: '#06b6d4' },
  { id: 4, name: 'Bay Bino',   cost: 5.00,  price: 10, perCarton: 24, initialStock: 48,  color: '#f59e0b' },
  { id: 5, name: 'Leone',      cost: 10.00, price: 15, perCarton: 25, initialStock: 75,  color: '#10b981' },
  { id: 6, name: 'Classico',   cost: 12.00, price: 17, perCarton: 22, initialStock: 22,  color: '#6366f1' },
  { id: 7, name: 'Yosse',      cost: 4.17,  price: 10, perCarton: 24, initialStock: 72,  color: '#f43f5e' },
  { id: 8, name: 'Solero',     cost: 12.00, price: 20, perCarton: 25, initialStock: 50,  color: '#f97316' },
  { id: 9, name: 'Magnum',     cost: 17.50, price: 23, perCarton: 20, initialStock: 80,  color: '#a16207' },
];

const LOW_STOCK = 15;

let cart = {}; // { productId: pieces }
let orderCount = parseInt(localStorage.getItem('maalem_orders') || '0');
let stock = loadStock();

function loadStock() {
  try {
    const saved = JSON.parse(localStorage.getItem('maalem_stock'));
    if (saved && typeof saved === 'object') {
      const s = {};
      PRODUCTS.forEach(p => {
        s[p.id] = Number.isFinite(saved[p.id]) ? saved[p.id] : p.initialStock;
      });
      return s;
    }
  } catch (e) {}
  const s = {};
  PRODUCTS.forEach(p => s[p.id] = p.initialStock);
  return s;
}

function saveStock() {
  localStorage.setItem('maalem_stock', JSON.stringify(stock));
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function getTotal() {
  return PRODUCTS.reduce((sum, p) => sum + (cart[p.id] || 0) * p.price, 0);
}
function getProfit() {
  return PRODUCTS.reduce((sum, p) => sum + (cart[p.id] || 0) * (p.price - p.cost), 0);
}
function getTotalPieces() {
  return Object.values(cart).reduce((s, q) => s + q, 0);
}
function fmt(n) {
  return (Math.round(n * 100) / 100).toLocaleString('fr-MA') + ' DH';
}

function addToCart(id) {
  const inCart = cart[id] || 0;
  if (inCart >= (stock[id] || 0)) {
    if (navigator.vibrate) navigator.vibrate([60, 40, 60]);
    return;
  }
  cart[id] = inCart + 1;
  updateUI();
  if (navigator.vibrate) navigator.vibrate(15);
}

function removeFromCart(id) {
  if (!cart[id]) return;
  cart[id]--;
  if (cart[id] === 0) delete cart[id];
  updateUI();
  if (navigator.vibrate) navigator.vibrate(15);
}

function clearCart() {
  cart = {};
  updateUI();
  closeCart();
}

function stockClass(q) {
  if (q <= 0) return 'out';
  if (q <= LOW_STOCK) return 'low';
  return '';
}
function stockLabel(q) {
  if (q <= 0) return 'Rupture de stock';
  return 'Stock: ' + q + ' pcs';
}

function updateUI() {
  const total = getTotal();
  const pieces = getTotalPieces();
  const itemCount = Object.keys(cart).length;

  const badge = document.getElementById('cartBadge');
  badge.textContent = itemCount;
  badge.classList.toggle('show', itemCount > 0);

  const bar = document.getElementById('floatingBar');
  bar.classList.toggle('show', pieces > 0);
  document.getElementById('fbCount').textContent = pieces + ' pcs';
  document.getElementById('fbTotal').textContent = fmt(total);

  document.getElementById('totalPieces').textContent = pieces;
  document.getElementById('totalProfit').textContent = '+' + fmt(getProfit());
  document.getElementById('totalAmount').textContent = fmt(total);
  document.getElementById('checkoutBtn').disabled = pieces === 0;

  PRODUCTS.forEach(p => {
    const chip = document.querySelector(`.qty-chip[data-id="${p.id}"]`);
    const card = document.querySelector(`.product-card[data-id="${p.id}"]`);
    if (!chip || !card) return;
    const q = cart[p.id] || 0;
    chip.textContent = q;
    chip.classList.toggle('show', q > 0);
    card.classList.toggle('in-cart', q > 0);
  });

  renderCartList();
}

function renderCartList() {
  const list = document.getElementById('cartList');
  const items = PRODUCTS.filter(p => cart[p.id]);

  if (items.length === 0) {
    list.innerHTML = `<div class="cart-empty">Panier vide<br>Ajoutez des produits</div>`;
    return;
  }

  list.innerHTML = items.map(p => `
    <div class="cart-item">
      <div class="ci-avatar" style="background:${p.color}">${initials(p.name)}</div>
      <div class="ci-info">
        <div class="ci-name">${p.name}</div>
        <div class="ci-price">${p.price} DH/pc · <b>${fmt(cart[p.id] * p.price)}</b></div>
      </div>
      <div class="ci-controls">
        <button class="qty-btn" onclick="removeFromCart(${p.id})">&minus;</button>
        <span class="qty-num">${cart[p.id]}</span>
        <button class="qty-btn" onclick="addToCart(${p.id})">+</button>
      </div>
    </div>
  `).join('');
}

function renderProducts(query = '') {
  const grid = document.getElementById('productGrid');
  const q = query.trim().toLowerCase();
  const filtered = q ? PRODUCTS.filter(p => p.name.toLowerCase().includes(q)) : PRODUCTS;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-results">Aucun produit trouvé</div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const s = stock[p.id] || 0;
    return `
    <div class="product-card ${s <= 0 ? 'out-of-stock' : ''}" data-id="${p.id}" onclick="addToCart(${p.id})">
      <span class="qty-chip" data-id="${p.id}">${cart[p.id] || 0}</span>
      <div class="product-avatar" style="background:${p.color}">${initials(p.name)}</div>
      <div class="product-name">${p.name}</div>
      <div class="product-price">Pièce: <span>${p.price} DH</span></div>
      <div class="product-stock ${stockClass(s)}">${stockLabel(s)}</div>
    </div>
  `}).join('');
  updateUI();
}

function openCart() {
  document.getElementById('cartOverlay').classList.add('open');
  document.getElementById('cartDrawer').classList.add('open');
  document.body.style.overflow = 'hidden';
  renderCartList();
}
function closeCart() {
  document.getElementById('cartOverlay').classList.remove('open');
  document.getElementById('cartDrawer').classList.remove('open');
  document.body.style.overflow = '';
}

function checkout() {
  const items = PRODUCTS.filter(p => cart[p.id]);
  if (!items.length) return;

  orderCount++;
  localStorage.setItem('maalem_orders', orderCount);

  // decrement stock
  items.forEach(p => {
    stock[p.id] = Math.max(0, (stock[p.id] || 0) - cart[p.id]);
  });
  saveStock();

  const now = new Date();
  const dateStr = now.toLocaleDateString('fr-MA', { day: '2-digit', month: '2-digit', year: 'numeric' });
  const timeStr = now.toLocaleTimeString('fr-MA', { hour: '2-digit', minute: '2-digit' });

  document.getElementById('receiptDate').textContent = dateStr + ' — ' + timeStr;
  document.getElementById('receiptRef').textContent = 'Vente #' + String(orderCount).padStart(4, '0');

  document.getElementById('receiptLines').innerHTML = items.map(p => `
    <div class="receipt-line">
      <div>
        <div class="rl-name">${p.name}</div>
        <div class="rl-qty">${cart[p.id]} pc${cart[p.id] > 1 ? 's' : ''} &times; ${p.price} DH</div>
      </div>
      <div class="rl-total">${fmt(cart[p.id] * p.price)}</div>
    </div>
  `).join('');

  document.getElementById('rPieces').textContent = getTotalPieces() + ' pcs';
  document.getElementById('rProfit').textContent = '+' + fmt(getProfit());
  document.getElementById('rTotal').textContent = fmt(getTotal());

  closeCart();
  document.getElementById('receiptOverlay').classList.add('open');
  if (navigator.vibrate) navigator.vibrate([50, 30, 80]);
}

function closeReceipt() {
  document.getElementById('receiptOverlay').classList.remove('open');
  cart = {};
  renderProducts(document.querySelector('.search-input').value);
}

function newOrder() {
  closeReceipt();
}

/* Stock panel */
function openStock() {
  renderStock();
  document.getElementById('stockOverlay').classList.add('open');
  document.getElementById('stockPanel').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeStock() {
  document.getElementById('stockOverlay').classList.remove('open');
  document.getElementById('stockPanel').classList.remove('open');
  document.body.style.overflow = '';
  renderProducts(document.querySelector('.search-input').value);
}

function renderStock() {
  const list = document.getElementById('stockList');
  list.innerHTML = PRODUCTS.map(p => {
    const s = stock[p.id] || 0;
    const cartons = (s / p.perCarton).toFixed(1).replace(/\.0$/, '');
    return `
    <div class="stock-item">
      <div class="ci-avatar" style="background:${p.color}">${initials(p.name)}</div>
      <div class="si-info">
        <div class="si-name">${p.name}</div>
        <div class="si-detail">${p.perCarton} pcs/carton · &asymp;${cartons} cartons · achat ${p.cost} DH · vente ${p.price} DH</div>
      </div>
      <input class="si-input" type="number" min="0" inputmode="numeric" value="${s}"
        onchange="setStock(${p.id}, this.value)">
    </div>
  `}).join('');
  updateStockSummary();
}

function updateStockSummary() {
  const value = PRODUCTS.reduce((sum, p) => sum + (stock[p.id] || 0) * p.price, 0);
  const pieces = PRODUCTS.reduce((sum, p) => sum + (stock[p.id] || 0), 0);
  document.getElementById('stockValue').textContent = fmt(value);
  document.getElementById('stockPieces').textContent = pieces + ' pcs';
}

function setStock(id, value) {
  const v = Math.max(0, parseInt(value) || 0);
  stock[id] = v;
  saveStock();
  updateStockSummary();
}

function resetStock() {
  if (!confirm('Remettre le stock aux quantités initiales ?')) return;
  PRODUCTS.forEach(p => stock[p.id] = p.initialStock);
  saveStock();
  renderStock();
}

// Swipe down to close panels
[['cartDrawer', closeCart], ['stockPanel', closeStock]].forEach(([id, closeFn]) => {
  let startY = 0;
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
  el.addEventListener('touchmove', e => {
    if (e.target.closest('.cart-list, .stock-list')) return;
    if (e.touches[0].clientY - startY > 60) closeFn();
  }, { passive: true });
});

renderProducts();
updateUI();
</script>
</body>
</html>
